<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Always fetch the freshest app shell; data is fetched real-time in api.js -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Packages — Admin</title>
  <meta name="description" content="Admin dashboard for managing SIM package data in the sims repository.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%E2%97%8E</text></svg>">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <!-- GLOBAL TOP BAR -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo" aria-hidden="true">◎</span>
      <span class="topbar__name">Store</span>
      <span class="topbar__tag">Ad</span>
    </div>

    <div class="topbar__search">
      <span class="topbar__search-icon" aria-hidden="true">🔍</span>
      <input id="globalSearch" type="search" placeholder="Search countries…" aria-label="Global search">
    </div>

    <div class="topbar__actions">
      <button id="refreshBtn" class="btn btn--ghost btn--sm" type="button" title="Fetch the latest data from GitHub (bypass cache)">↻ Refresh</button>
      <button id="settingsBtn" class="btn btn--ghost btn--sm" type="button" title="GitHub auto-save settings">⚙ Settings</button>
    </div>
  </header>

  <!-- STAT STRIP -->
  <section class="stat-strip" aria-label="Repository statistics">
    <div class="stat">
      <div class="stat__num" id="statCountries">—</div>
      <div class="stat__label">Countries</div>
    </div>
    <div class="stat">
      <div class="stat__num" id="statOperators">—</div>
      <div class="stat__label">Operators</div>
    </div>
    <div class="stat">
      <div class="stat__num" id="statPackages">—</div>
      <div class="stat__label">Packages</div>
    </div>
  </section>

  <!-- THREE-PANEL DASHBOARD -->
  <main class="dashboard">
    <!-- LEFT: countries + search -->
    <aside class="panel panel--sidebar" aria-label="Countries">
      <div class="panel__head panel__head--sticky">
        <h2 class="panel__title">Countries</h2>
      </div>
      <div class="sidebar-search">
        <input id="countrySearch" type="search" placeholder="Filter countries…" aria-label="Filter countries">
      </div>
      <nav id="countryList" class="nav-list" aria-label="Country list"></nav>
    </aside>

    <!-- MIDDLE: operators + categories -->
    <section id="operatorPanel" class="panel panel--mid" aria-label="Operators">
      <div class="panel__head"><h2 class="panel__title">Operators</h2></div>
      <div class="panel__body">
        <div class="state state--empty">
          <div class="state__icon">🌍</div>
          <p class="state__title">Select a country</p>
          <p class="state__sub">Choose a country on the left to see its operators.</p>
        </div>
      </div>
    </section>

    <!-- RIGHT: packages + editor -->
    <section id="packagePanel" class="panel panel--right" aria-label="Packages">
      <div class="panel__head"><h2 class="panel__title">Packages</h2></div>
      <div class="panel__body">
        <div class="state state--empty">
          <div class="state__icon">📦</div>
          <p class="state__title">No category selected</p>
          <p class="state__sub">Pick an operator and category to view and edit packages.</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
