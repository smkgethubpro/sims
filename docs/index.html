<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Packages — Admin</title>
  <meta name="description" content="Admin dashboard for managing SIM package data.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%E2%97%8E</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── Design tokens ─────────────────────────────────────── */
    :root {
      --bg-base:       #F1F5F9;   /* slate-100 — very light gray-blue */
      --bg-panel:      #FFFFFF;
      --bg-elevated:   #F8FAFC;   /* slate-50 */
      --bg-hover:      #F1F5F9;

      --border-subtle: #E2E8F0;   /* slate-200 */
      --border-mid:    #CBD5E1;   /* slate-300 */
      --border-strong: #94A3B8;   /* slate-400 */

      --accent:        #0891B2;   /* cyan-600 — reads clearly on white */
      --accent-dim:    rgba(8, 145, 178, 0.07);
      --accent-border: rgba(8, 145, 178, 0.25);
      --accent-glow:   rgba(8, 145, 178, 0.15);

      --text-hi:   #0F172A;   /* slate-900 */
      --text-md:   #64748B;   /* slate-500 */
      --text-lo:   #94A3B8;   /* slate-400 */

      --green:  #16A34A;
      --amber:  #D97706;
      --red:    #DC2626;

      --topbar-h: 48px;
      --stat-h:   52px;
      --r-sm:     4px;
      --r-md:     6px;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-base);
      color: var(--text-hi);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Thin scrollbars */
    * { scrollbar-width: thin; scrollbar-color: var(--border-mid) transparent; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    /* Focus ring */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }

    /* ─── Topbar ─────────────────────────────────────────────── */
    .topbar {
      height: var(--topbar-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 100;

      /* Signature: dot-grid texture — light on white */
      background-image: radial-gradient(circle, #E2E8F0 1px, transparent 1px);
      background-size: 18px 18px;
      /* Thin accent stripe at the very top */
      border-top: 3px solid var(--accent);
    }

    .topbar__brand {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .topbar__logo {
      font-size: 17px;
      color: var(--accent);
      filter: drop-shadow(0 0 5px var(--accent-glow));
      line-height: 1;
    }

    .topbar__name {
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text-hi);
    }

    .topbar__tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: var(--r-sm);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }

    .topbar__sep {
      width: 1px;
      height: 18px;
      background: var(--border-subtle);
      flex-shrink: 0;
    }

    /* Search */
    .topbar__search {
      flex: 1;
      max-width: 340px;
      position: relative;
    }

    .topbar__search-icon {
      position: absolute;
      inset: 0 auto 0 10px;
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--text-lo);
      pointer-events: none;
    }

    .topbar__search input {
      width: 100%;
      height: 30px;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-sm);
      padding: 0 12px 0 30px;
      font: 13px/1 'Inter', sans-serif;
      color: var(--text-hi);
      transition: border-color 0.15s, background 0.15s;
    }

    .topbar__search input::placeholder { color: var(--text-lo); }
    .topbar__search input:focus {
      outline: none;
      border-color: var(--accent-border);
      background: var(--bg-elevated);
    }

    .topbar__actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 30px;
      padding: 0 11px;
      border-radius: var(--r-sm);
      font: 500 12.5px/1 'Inter', sans-serif;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .btn--ghost {
      background: transparent;
      color: var(--text-md);
      border-color: var(--border-subtle);
    }

    .btn--ghost:hover {
      background: var(--bg-elevated);
      color: var(--text-hi);
      border-color: var(--border-mid);
    }

    /* ─── Stat strip ─────────────────────────────────────────── */
    .stat-strip {
      height: var(--stat-h);
      flex-shrink: 0;
      display: flex;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-subtle);
    }

    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border-right: 1px solid var(--border-subtle);
      transition: background 0.15s;
      cursor: default;
    }

    .stat:last-child { border-right: none; }
    .stat:hover { background: var(--bg-hover); }

    .stat__num {
      font: 500 19px/1 'JetBrains Mono', monospace;
      color: var(--text-hi);
      letter-spacing: -0.03em;
    }

    .stat__label {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-lo);
    }

    /* ─── Dashboard ──────────────────────────────────────────── */
    .dashboard {
      flex: 1;
      display: grid;
      grid-template-columns: 216px 268px 1fr;
      overflow: hidden;
    }

    /* ─── Panels ─────────────────────────────────────────────── */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border-subtle);
      background: var(--bg-panel);
    }

    .panel:last-child { border-right: none; }

    .panel__head {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 14px;
      height: 38px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .panel__title {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-lo);
    }

    .panel__body {
      flex: 1;
      overflow-y: auto;
    }

    /* ─── Sidebar search ─────────────────────────────────────── */
    .sidebar-search {
      flex-shrink: 0;
      padding: 9px 10px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-search input {
      width: 100%;
      height: 28px;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-sm);
      padding: 0 10px;
      font: 12.5px/1 'Inter', sans-serif;
      color: var(--text-hi);
      transition: border-color 0.15s;
    }

    .sidebar-search input::placeholder { color: var(--text-lo); }
    .sidebar-search input:focus {
      outline: none;
      border-color: var(--accent-border);
    }

    /* ─── Country list ────────────────────────────────────────── */
    #countryList {
      flex: 1;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px 7px 11px;
      font-size: 13px;
      color: var(--text-md);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s, color 0.1s, border-color 0.15s;
      user-select: none;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-hi);
    }

    .nav-item[aria-selected="true"] {
      background: var(--accent-dim);
      color: var(--text-hi);
      border-left-color: var(--accent);
    }

    .nav-item__flag {
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
    }

    .nav-item__name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-item__count {
      font: 400 11px/1 'JetBrains Mono', monospace;
      color: var(--text-lo);
      flex-shrink: 0;
    }

    /* ─── Empty states ────────────────────────────────────────── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 28px;
      height: 100%;
      min-height: 200px;
      gap: 0;
    }

    .state__icon {
      font-size: 28px;
      margin-bottom: 14px;
      opacity: 0.35;
    }

    .state__title {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-md);
      margin-bottom: 5px;
    }

    .state__sub {
      font-size: 12px;
      color: var(--text-lo);
      line-height: 1.55;
      max-width: 190px;
    }

    /* ─── Reduced motion ──────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    /* ─── Responsive: stack on narrow viewports ───────────────── */
    @media (max-width: 700px) {
      .dashboard { grid-template-columns: 1fr; }
      .panel { display: none; }
      .panel--sidebar { display: flex; }
    }
  </style>
</head>
<body>

  <!-- ── TOPBAR ──────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo" aria-hidden="true">◎</span>
      <span class="topbar__name">Store</span>
      <span class="topbar__tag" title="Admin panel">Admin</span>
    </div>

    <div class="topbar__sep" aria-hidden="true"></div>

    <div class="topbar__search">
      <span class="topbar__search-icon" aria-hidden="true">⌕</span>
      <input
        id="globalSearch"
        type="search"
        placeholder="Search countries…"
        aria-label="Global search"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="topbar__actions">
      <button id="settingsBtn" class="btn btn--ghost" type="button" aria-label="GitHub auto-save settings">
        <span aria-hidden="true">⚙</span> Settings
      </button>
    </div>
  </header>

  <!-- ── STAT STRIP ──────────────────────────────────────────── -->
  <section class="stat-strip" aria-label="Repository statistics">
    <div class="stat" role="status" aria-live="polite" aria-atomic="true">
      <div class="stat__num" id="statCountries">—</div>
      <div class="stat__label">Countries</div>
    </div>
    <div class="stat" role="status" aria-live="polite" aria-atomic="true">
      <div class="stat__num" id="statOperators">—</div>
      <div class="stat__label">Operators</div>
    </div>
    <div class="stat" role="status" aria-live="polite" aria-atomic="true">
      <div class="stat__num" id="statPackages">—</div>
      <div class="stat__label">Packages</div>
    </div>
  </section>

  <!-- ── DASHBOARD ───────────────────────────────────────────── -->
  <main class="dashboard">

    <!-- LEFT: Countries -->
    <section class="panel panel--sidebar" aria-label="Countries">
      <div class="panel__head">
        <h2 class="panel__title">Countries</h2>
      </div>
      <div class="sidebar-search">
        <input
          id="countrySearch"
          type="search"
          placeholder="Filter…"
          aria-label="Filter countries"
          autocomplete="off"
        >
      </div>
      <nav
        id="countryList"
        aria-label="Country list"
        role="listbox"
        aria-multiselectable="false"
      ></nav>
    </section>

    <!-- MIDDLE: Operators -->
    <section
      id="operatorPanel"
      class="panel panel--mid"
      aria-label="Operators"
      aria-live="polite"
    >
      <div class="panel__head">
        <h2 class="panel__title">Operators</h2>
      </div>
      <div class="panel__body">
        <div class="state state--empty">
          <div class="state__icon" aria-hidden="true">🌍</div>
          <p class="state__title">Select a country</p>
          <p class="state__sub">Choose a country on the left to see its operators.</p>
        </div>
      </div>
    </section>

    <!-- RIGHT: Packages -->
    <section
      id="packagePanel"
      class="panel panel--right"
      aria-label="Packages"
      aria-live="polite"
    >
      <div class="panel__head">
        <h2 class="panel__title">Packages</h2>
      </div>
      <div class="panel__body">
        <div class="state state--empty">
          <div class="state__icon" aria-hidden="true">📦</div>
          <p class="state__title">No category selected</p>
          <p class="state__sub">Pick an operator and category to view packages.</p>
        </div>
      </div>
    </section>

  </main>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
